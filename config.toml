[app]
database_path = "~/.config/gtimer/gtimer.db"
refresh_interval_ms = 1000
regular_application_limit = 5

[timers.minecraft]
label = "Minecraft Time"
prominent = true
title_contains = ["Minecraft"]
instance_contains = ["minecraft"]

[allowances.minecraft]
timer = "minecraft"
enabled = true
credit_days = ["friday", "saturday", "sunday"]
credit_seconds = 3600

[ignore]
title_contains = ["gTimer"]
